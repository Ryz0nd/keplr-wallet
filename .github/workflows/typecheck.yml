name: Typecheck
on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v3
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install --global yarn
      - run: yarn install --immutable
      - run: yarn workspace @keplr-wallet/proto-types build
      - run: yarn typecheck
